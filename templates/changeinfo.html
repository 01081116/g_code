{% extends 'base.html' %}
{% block content %}

    <div class="page-right-content" style="min-height: 1000px;">
        <div class="content-line">
            <div class="line-header">
                <span class="header-text">修改个人信息</span>
            </div>
            <div class="changeinfo-form">
                <form method="POST" action="{{ url_for('front.updateinfo') }}">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" value="{{ res[0][1] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" value="{{ res[0][2] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">手机号</label>
                        <input type="text" id="phone" name="phone" value="{{ res[0][3] }}" required>
                    </div>
                    <div class="form-group">
                        <label for="password">邮箱</label>
                        <input type="text" id="email" name="email" value="{{ res[0][4] }}" required>
                    </div>
                    <button type="submit" class="btn-submit">保存修改</button>
                </form>
            </div>
        </div>
    </div>

    <style>
        /* 表单样式 */
        .changeinfo-form {
            max-width: 500px;
            margin: 0 auto;
            padding: 2rem;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 1rem;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-submit:hover {
            background: #2980b9;
        }
    </style>

{% endblock %}
