</div>

                    <li><a class="active" href="/new_playlists/list">歌单数据表</a></li>
                </ul>
            </li>
            <li class="">
                <a href="#"><i class="icon ti-home"></i> <span>歌曲数据管理</span> </a>

<!--顶部-->
<!-- begin::navbar -->
<nav class="navbar">
    <div class="container-fluid">
        <div class="header-logo">
        </div>
        <div class="header-body">
            <form class="search">
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="Search ..."
                           aria-label="Recipient's username"
                           aria-describedby="button-addon2">
                    <div class="input-group-append">
                        <button class="btn" type="button" id="button-addon2">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
            </form>
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a href="#" class="d-lg-none d-sm-block nav-link search-panel-open">
                        <i class="fa fa-search"></i>
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a href="#" data-toggle="dropdown">
                        <figure class="avatar avatar-sm avatar-state-success">
                            <img class="rounded-circle"
                                 src="{{ url_for('static', filename='assets/media/image/avatar.jpg') }}" alt="...">
                        </figure>
                    </a>
                    <div class="dropdown-menu dropdown-menu-right">
                        <a href="{{ url_for('admin_login.pwd') }}" class="text-primary dropdown-item">修改密码</a>
                        <div class="dropdown-divider"></div>
                        <a href="{{ url_for('admin_login.logout') }}" class="text-danger dropdown-item">退出</a>
                    </div>
                </li>
                <li class="nav-item d-lg-none d-sm-block">
                    <a href="#" class="nav-link side-menu-open">
                        <i class="ti-menu"></i>
                    </a>
                </li>
            </ul>
        </div>

    </div>
</nav>
