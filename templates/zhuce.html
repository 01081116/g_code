<!DOCTYPE html>
<html lang="en">
<head>
    <title>注册 - 音乐推荐系统</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
    <meta name="author" content="Xiaoying Riley at 3rd Wave Media">
    <script defer src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/5.14.0/js/all.min.js"></script>
    <link id="theme-style" rel="stylesheet" href="static/css/portal.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> <!-- 使用 jQuery -->
</head>
<body class="app app-signup p-0">
<div class="row g-0 app-auth-wrapper">
    <div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
        <div class="d-flex flex-column align-content-end">
            <div class="app-auth-body mx-auto">
                <div class="app-auth-branding mb-4">
                    <a class="app-logo" href="index.html"><img class="logo-icon mr-2" src="static/images/app-logo.svg" alt="logo"></a>
                </div>
                <h2 class="auth-heading text-center mb-4">注册 - 音乐推荐系统</h2>
                <div class="auth-form-container text-left mx-auto">
                    <form id="signup-form" class="auth-form auth-signup-form">
                        <div class="username mb-3">
                            <label class="sr-only" for="signup-username">用户名</label>
                            <input id="signup-username" name="username" type="text" class="form-control" placeholder="用户名" required>
                        </div>
                        <div class="password mb-3">
                            <label class="sr-only" for="signup-password">密码</label>
                            <input id="signup-password" name="password" type="password" class="form-control" placeholder="创建一个密码" required>
                        </div>
                        <div class="phone mb-3">
                            <label class="sr-only" for="signup-phone">手机号</label>
                            <input id="signup-phone" name="phone" type="text" class="form-control" placeholder="手机号" required>
                        </div>
                        <div class="email mb-3">
                            <label class="sr-only" for="signup-email">邮箱</label>
                            <input id="signup-email" name="email" type="email" class="form-control" placeholder="邮箱" required>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn app-btn-primary btn-block theme-btn mx-auto">注册</button>
                        </div>
                    </form>
                    <div class="auth-option text-center pt-5">已经有账户？ <a class="text-link" href="/">登录</a></div>
                </div>
            </div>
            <footer class="app-auth-footer">
                <div class="container text-center py-3">
                    <small class="copyright">Designed with <i class="fas fa-heart" style="color: #fb866a;"></i> by <a class="app-link" href="#">Xiaohongshu </a> for developers</small>
                </div>
            </footer>
        </div>
    </div>
    <div class="col-12 col-md-5 col-lg-6 h-100 auth-background-col">
        <div class="auth-background-holder"></div>
        <div class="auth-background-mask"></div>
        <div class="auth-background-overlay p-3 p-lg-5"></div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#signup-form').on('submit', function(event) {
            event.preventDefault(); // 防止表单默认提交

            // 准备数据
            const formData = {
                username: $('#signup-username').val(),
                password: $('#signup-password').val(),
                phone: $('#signup-phone').val(),
                email: $('#signup-email').val()
            };

            // 发送 AJAX 请求
            $.ajax({
                type: 'POST',
                url: '/dozhuce',
                data: formData,
                success: function(response) {
                    if (response.status === false) {
                        alert('用户名已存在！'); // 用户名已存在提示
                    } else {
                        alert('注册成功！'); // 注册成功提示
                        window.location.href = '/'; // 跳转到登录页面
                    }
                },
                error: function() {
                    alert('注册请求失败，请稍后再试！'); // 请求失败提示
                }
            });
        });
    });
</script>
</body>
</html>
