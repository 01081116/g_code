<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Gramos - Admin Dashboard</title>

    <!-- begin::global styles -->
    <link rel="stylesheet" href="/static/assets/vendors/bundle.css" type="text/css">
    <!-- end::global styles -->

    <!-- begin::custom styles -->
    <link rel="stylesheet" href="/static/assets/css/app.css" type="text/css">
    <!-- end::custom styles -->

</head>
<body class="bg-white h-100-vh p-t-0">

<!-- begin::page loader-->
<div class="page-loader">
    <div class="spinner-border"></div>
    <span>Loading ...</span>
</div>
<!-- end::page loader -->

<div class="p-b-50 d-block d-lg-none"></div>

<div class="container h-100-vh">
    <div class="row align-items-md-center h-100-vh">
        <div class="col-lg-6 d-none d-lg-block">
            <img class="img-fluid" src="/static/assets/media/svg/login.svg" alt="...">
        </div>
        <div class="col-lg-4 offset-lg-1">
            <div class="d-flex align-items-center m-b-20">
                <img src="/static/assets/media/image/dark-logo.png" class="m-r-15" width="40" alt="">
                <h3 class="m-0">后台管理</h3>
            </div>
            <p>Sign in to continue.</p>

            <!-- 错误信息显示，初始状态为隐藏 -->
            <div class="alert alert-danger" id="flash-message" style="display: none;"></div>

            <form id="loginForm">
                <div class="form-group mb-4">
                    <input type="text" class="form-control form-control-lg" id="username" name="username"
                           autofocus placeholder="Email or username">
                </div>
                <div class="form-group mb-4">
                    <input type="password" class="form-control form-control-lg" id="password"
                           name="password" placeholder="Password">
                </div>
                <button class="btn btn-primary btn-lg btn-block btn-uppercase mb-4" type="button"
                        onclick="submitLogin()">登 录
                </button>
            </form>
        </div>
    </div>
</div>


<script>
    function submitLogin() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        if (!username || !password) {
            alert('用户名和密码不能为空');
            return;
        }

        fetch('{{ url_for('admin_login.login') }}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({username: username, password: password})
        })
            .then(response => response.json())
            .then(data => {
                const flashMessage = document.getElementById('flash-message');
                if (data.success) {
                    window.location.href = data.redirect_url;
                } else {
                    flashMessage.innerHTML = data.message;
                    flashMessage.style.display = 'block';
                    setTimeout(function () {
                        flashMessage.style.display = 'none';
                        flashMessage.innerHTML = '';
                    }, 2000);
                }
            })
            .catch(error => console.error('Error:', error));
    }
</script>


<!-- begin::global scripts -->
<script src="/static/assets/vendors/bundle.js"></script>
<!-- end::global scripts -->

<!-- begin::custom scripts -->
<script src="/static/assets/js/app.js"></script>
<!-- end::custom scripts -->

</body>
</html>
