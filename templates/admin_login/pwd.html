{% extends 'admin_base.html' %}
{% block content %}
    <main class="main-content">
        <section class="page-nav">
            <ol class="breadcrumb">
                <li><a href="#"><i class="fa fa-dashboard"></i> 个人资料/</a></li>
                <li class="active">修改密码</li>
            </ol>
        </section>
        <section class="password-reset" id="showcontent" style="margin-top: 20px">
            <div class="row">
                <div class="col-md-12">
                    <div class="reset-box box-primary">
                        <div class="reset-box-header with-border">
                            <h3 class="reset-box-title">修改密码</h3>
                        </div>
                        <form id="passwordForm" role="form">
                            <div class="reset-box-body">
                                <div class="form-group">
                                    <label for="input_old_pwd">旧密码</label>
                                    <input type="password" id="old_pwd" name="old_pwd" class="form-control"
                                           placeholder="请输入旧密码！" required>
                                </div>
                                <div class="form-group">
                                    <label for="input_new_pwd">新密码</label>
                                    <input type="password" id="new_pwd" name="new_pwd" class="form-control"
                                           placeholder="请输入新密码！" required>
                                </div>
                            </div>
                            <div class="reset-box-footer">
                                <button type="button" class="btn btn-primary" onclick="submitPasswordForm()">保存
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script>
        function submitPasswordForm() {
            var oldPwd = document.getElementById('old_pwd').value;
            var newPwd = document.getElementById('new_pwd').value;

            fetch('{{ url_for("admin_login.pwd") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({old_pwd: oldPwd, new_pwd: newPwd})
            })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'ok') {
                        alert(data.msg);
                        {#window.location.href = "{{ url_for('admin_login.logout') }}";#}
                    } else {
                        alert(data.msg);
                    }
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
{% endblock %}
