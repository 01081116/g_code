<!-- 前端模板（search.html） -->
{% extends 'base.html' %}
{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
    .main-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
    }

    .search-container {
        display: flex;
        gap: 1rem;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .header-search {
        flex: 1;
        padding: 0.8rem 1.2rem;
        border: 2px solid #e0e0e0;
        border-radius: 25px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .header-search:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 8px rgba(76, 175, 80, 0.2);
    }

    .search-button {
        padding: 0.8rem 2rem;
        border: none;
        border-radius: 25px;
        background: linear-gradient(135deg, #4CAF50, #45a049);
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .search-button:hover {
        transform: translateY(-2px);
    }

    .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 2rem;
        padding: 2rem 1rem;
    }

    .music-card {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        overflow: hidden;
        position: relative;
    }

    .music-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
    }

    .card-image {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-bottom: 1px solid #f0f0f0;
    }

    .card-content {
        padding: 1.5rem;
    }

    .card-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: #333;
        margin-bottom: 0.5rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .card-subtitle {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 1rem;
    }

    .card-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
    }

    .album-name {
        font-size: 0.85rem;
        color: #888;
        max-width: 60%;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .popularity-badge {
        background: linear-gradient(135deg, #FF6B6B, #FF4757);
        color: white;
        padding: 0.4rem 1rem;
        border-radius: 20px;
        font-size: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .card-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
    }

    .btn-play, .btn-collect {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0.8rem;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-play {
        background: linear-gradient(135deg, #4CAF50, #45a049);
        color: white;
    }

    .btn-play:hover {
        opacity: 0.9;
    }

    .btn-collect {
        background: rgba(255, 71, 87, 0.1);
        color: #FF4757;
    }

    .btn-uncollect {
        background: #FF4757;
        color: white;
        border: none;
        width: 100px;
        border-radius: 20px;
    }

    .no-results {
        text-align: center;
        color: #666;
        padding: 4rem;
        font-size: 1.2rem;
    }
</style>

<div class="main-container">
    <form action="/search" method="post">
        <div class="search-container">
            <input type="text" 
                   id="search" 
                   name="search_wd" 
                   class="header-search"
                   placeholder="搜索歌曲、歌手或专辑..."
                   value="{{ search_wd or '' }}">
            <button type="submit" class="search-button">
                <i class="fas fa-search"></i>
                搜索
            </button>
        </div>
    </form>

    {% if datalist %}
    <div class="card-grid">
        {% for song in datalist %}
        <div class="music-card" data-collected="{{ song[8] }}">
            <img src="{{ song[5] }}" class="card-image" alt="{{ song[2] }}封面">
            <div class="card-content">
                <h3 class="card-title">{{ song[2] }}</h3>
                <p class="card-subtitle">{{ song[3] }}</p>
                <div class="card-meta">
                    <span class="album-name">{{ song[4] }}</span>
                    <div class="popularity-badge">
                        <i class="fas fa-fire"></i>
                        {{ song[6] }}
                    </div>
                </div>
                <div class="card-actions">
                    <button class="btn-play"
                            data-song-id="{{ song[1] }}"
                            data-song-name="{{ song[2] }}"
                            data-song-singer="{{ song[3] }}"
                            data-song-cover="{{ song[5] }}">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="{{ 'btn-uncollect' if song[8] else 'btn-collect' }}"
                            data-song-id="{{ song[0] }}">
                        <i class="{{ 'fas' if song[8] else 'far' }} fa-heart"></i>
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="no-results">
        <i class="fas fa-music fa-2x"></i>
        <p>没有找到相关结果，尝试其他关键词</p>
    </div>
    {% endif %}
</div>

<script>
    $(document).ready(function() {
        // 收藏状态初始化
        $('.music-card').each(function() {
            const isCollected = $(this).data('collected') === 1;
            const $btn = $(this).find('.btn-collect, .btn-uncollect');
            
            if (isCollected) {
                $btn.removeClass('btn-collect').addClass('btn-uncollect');
                $btn.find('i').removeClass('far').addClass('fas');
            }
        });

        // 收藏/取消收藏操作
        $('.btn-collect, .btn-uncollect').click(function() {
            const $btn = $(this);
            const isUncollect = $btn.hasClass('btn-uncollect');
            const songId = $btn.data('song-id');
            const $card = $btn.closest('.music-card');

            $.ajax({
                url: isUncollect ? '/uncollected' : '/collected',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ id: songId }),
                success: function(response) {
                    $btn.toggleClass('btn-collect btn-uncollect');
                    $btn.find('i')
                        .toggleClass('far fas')
                        .css('color', isUncollect ? '#FF4757' : '#fff');
                    
                    $card.css('transform', 'scale(0.98)');
                    setTimeout(() => $card.css('transform', ''), 200);

                    if (response.message) {
                        showToast(response.message);
                    }
                },
                error: function(xhr) {
                    showToast('操作失败: ' + xhr.responseJSON.error);
                }
            });
        });

        function showToast(message) {
            const toast = $('<div class="toast">').text(message);
            $('body').append(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    });
</script>
{% endblock %}
