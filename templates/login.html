<!DOCTYPE html>
<html lang="en">
<head>
    <title>登录 - 音乐推荐系统</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portal - Bootstrap 5 Admin Dashboard Template For Developers">
    <meta name="author" content="Xiaoying Riley at 3rd Wave Media">
    <script defer src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/font-awesome/5.14.0/js/all.min.js"></script>
    <link id="theme-style" rel="stylesheet" href="static/css/portal.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> <!-- 使用 jQuery -->
</head>
<body class="app app-login p-0">
<div class="row g-0 app-auth-wrapper">
    <div class="col-12 col-md-7 col-lg-6 auth-main-col text-center p-5">
        <div class="d-flex flex-column align-content-end">
            <div class="app-auth-body mx-auto">
                <div class="app-auth-branding mb-4">
                    <a class="app-logo" href="">
                        <img class="logo-icon mr-2" src="static/images/app-logo.svg" alt="logo">
                    </a>
                </div>
                <h2 class="auth-heading text-center mb-5">登录 - 音乐推荐系统</h2>
                <div class="auth-form-container text-left">
                    <form id="login-form" class="auth-form login-form">
                        <div class="email mb-3">
                            <label class="sr-only" for="signin-username">用户名</label>
                            <input id="signin-username" name="username" type="text" class="form-control" placeholder="用户名" required>
                        </div>
                        <div class="password mb-3">
                            <label class="sr-only" for="signin-password">密码</label>
                            <input id="signin-password" name="password" type="password" class="form-control" placeholder="密码" required>
                            <div class="extra mt-3 row justify-content-between">
                                <div class="col-6">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="" id="RememberPassword">
                                        <label class="form-check-label" for="RememberPassword">记住我</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn app-btn-primary btn-block theme-btn mx-auto">登录</button>
                        </div>
                    </form>
                    <div class="auth-option text-center pt-5">没有账号？<a class="text-link" href="/zhuce">注册这里</a>.</div>
                </div>
            </div>
            <footer class="app-auth-footer">
                <div class="container text-center py-3">
                    <small class="copyright">Designed with <i class="fas fa-heart" style="color: #fb866a;"></i> by <a class="app-link" href="#">music </a> for developers</small>
                </div>
            </footer>
        </div>
    </div>
    <div class="col-12 col-md-5 col-lg-6 h-100 auth-background-col">
        <div class="auth-background-holder"></div>
        <div class="auth-background-mask"></div>
        <div class="auth-background-overlay p-3 p-lg-5"></div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $('#login-form').on('submit', function(event) {
            event.preventDefault(); // 防止表单默认提交

            // 准备数据
            const formData = {
                username: $('#signin-username').val(),
                password: $('#signin-password').val()
            };

            // 发送 AJAX 请求
            $.ajax({
                type: 'POST',
                url: '/dologin',
                data: formData,
                success: function(response) {
                    if (response.status === true) {
                        alert('登录成功！'); // 登录成功提示
                        window.location.href = response.redirect; // 重定向到首页
                    } else {
                        alert('用户名或密码错误！'); // 登录失败提示
                    }
                },
                error: function() {
                    alert('登录请求失败，请稍后再试！'); // 请求失败提示
                }
            });
        });
    });
</script>
</body>
</html>
